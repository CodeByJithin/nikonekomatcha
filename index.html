<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1">
  <title>Niko Neko Matcha</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    :root {
      --white: #ffffff;
      --off-white: #f8f7f5;
      --light-gray: #ebebeb;
      --mid-gray: #999;
      --dark: #1a1a1a;
      --accent-green: #4a7c2f;
      --nav-height: 74px;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      overflow-x: hidden;
      font-family: 'Jost', sans-serif;
      background: var(--white);
      color: var(--dark);
    }

    /* ── LOGO BAR ── */
    .logo-bar {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px 0 16px;
      border-bottom: 1px solid var(--light-gray);
      background: var(--white);
      position: relative;
      z-index: 100;
    }

    .logo-bar img {
      height: 54px;
      width: auto;
      display: block;
      filter: none;
      transition: opacity 0.2s ease;
    }

    .logo-bar img:hover {
      opacity: 0.75;
    }

    /* ── NAVIGATION ── */
    nav {
      width: 100%;
      background: var(--white);
      border-bottom: 1px solid var(--light-gray);
      position: sticky;
      top: 0;
      z-index: 200;
    }

    .nav-inner {
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      height: var(--nav-height);
      padding: 0 40px;
      gap: 0;
      position: relative;
    }

    .nav-links {
      display: flex;
      align-items: center;
      list-style: none;
      gap: 0;
      flex: 1;
      justify-content: center;
    }

    .nav-links li {
      position: relative;
    }

    .nav-links li a {
      display: flex;
      align-items: center;
      gap: 5px;
      text-decoration: none;
      color: var(--dark);
      font-family: 'Jost', sans-serif;
      font-size: 13.5px;
      font-weight: 400;
      letter-spacing: 0.04em;
      padding: 10px 18px;
      transition: color 0.2s ease;
      white-space: nowrap;
    }

    .nav-links li a:hover {
      color: var(--accent-green);
    }

    .nav-links li a .plus {
      font-size: 11px;
      font-weight: 300;
      opacity: 0.6;
      margin-top: 1px;
    }

    /* Cart icon */
    .cart-btn {
      position: absolute;
      right: 40px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--dark);
      font-size: 20px;
      transition: color 0.2s ease;
      display: flex;
      align-items: center;
    }

    .cart-btn:hover {
      color: var(--accent-green);
    }

    /* Dropdown */
    .dropdown {
      position: absolute;
      top: calc(100% + 1px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--white);
      border: 1px solid var(--light-gray);
      border-top: 2px solid var(--accent-green);
      min-width: 180px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      transform: translateX(-50%) translateY(-6px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.08);
    }

    .nav-links li:hover .dropdown {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) translateY(0);
    }

    .dropdown a {
      display: block !important;
      padding: 11px 18px !important;
      font-size: 12.5px !important;
      color: var(--dark) !important;
      border-bottom: 1px solid var(--light-gray);
    }

    .dropdown a:last-child {
      border-bottom: none;
    }

    /* ── HERO ── */
    .hero {
      width: 100%;
      min-height: calc(100vh - var(--nav-height) - 91px);
      position: relative;
      overflow: hidden;
      background: #e8e8e4;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-img {
      width: 100%;
      height: 100%;
      position: absolute;
      inset: 0;
      object-fit: cover;
      object-position: center top;
      animation: heroReveal 1.4s cubic-bezier(0.22, 0.61, 0.36, 1) both;
    }

    @keyframes heroReveal {
      from {
        opacity: 0;
        transform: scale(1.04);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* Subtle overlay for depth */
    .hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(232, 232, 228, 0.12) 0%,
        rgba(232, 232, 228, 0) 40%,
        rgba(232, 232, 228, 0.18) 100%
      );
      pointer-events: none;
      z-index: 1;
    }

    /* ── MOBILE NAV TOGGLE ── */
    .hamburger {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      flex-direction: column;
      gap: 5px;
      position: absolute;
      left: 24px;
    }

    .hamburger span {
      display: block;
      width: 22px;
      height: 1.5px;
      background: var(--dark);
      transition: all 0.3s ease;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .nav-links {
        display: none;
        position: absolute;
        top: var(--nav-height);
        left: 0;
        width: 100%;
        background: var(--white);
        flex-direction: column;
        align-items: flex-start;
        border-top: 1px solid var(--light-gray);
        box-shadow: 0 12px 30px rgba(0,0,0,0.08);
        padding: 10px 0 20px;
      }

      .nav-links.open {
        display: flex;
      }

      .nav-links li a {
        padding: 12px 28px;
        font-size: 14px;
      }

      .hamburger {
        display: flex;
      }

      .cart-btn {
        right: 24px;
      }

      .hero {
        min-height: 70vw;
      }
    }

    @media (max-width: 480px) {
      .logo-bar img {
        height: 40px;
      }
      .hero {
        min-height: 85vw;
      }
    }
  </style>
</head>
<body>

  <!-- LOGO BAR -->
  <div class="logo-bar">
    <a href="#">
      <img
        src="https://www.nikonekomatcha.com/wp-content/uploads/2021/01/PNG-e1611764166163.png"
        alt="Niko Neko Matcha"
      />
    </a>
  </div>

  <!-- NAVIGATION -->
  <nav>
    <div class="nav-inner">

      <!-- Mobile hamburger -->
      <button class="hamburger" id="hamburger" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <ul class="nav-links" id="navLinks">

        <li>
          <a href="#">Shop <span class="plus">+</span></a>
          <div class="dropdown">
            <a href="#">All Products</a>
            <a href="#">Ceremonial Grade</a>
            <a href="#">Culinary Grade</a>
            <a href="#">Bundles</a>
          </div>
        </li>

        <li>
          <a href="#">Wholesale</a>
        </li>

        <li>
          <a href="#">Matcha Comparison <span class="plus">+</span></a>
          <div class="dropdown">
            <a href="#">Grade Guide</a>
            <a href="#">Origin Story</a>
            <a href="#">How to Choose</a>
          </div>
        </li>

        <li>
          <a href="#">Menu</a>
        </li>

        <li>
          <a href="#">Recipes <span class="plus">+</span></a>
          <div class="dropdown">
            <a href="#">Drinks</a>
            <a href="#">Food</a>
            <a href="#">Desserts</a>
          </div>
        </li>

        <li>
          <a href="#">Collaborations <span class="plus">+</span></a>
          <div class="dropdown">
            <a href="#">Partners</a>
            <a href="#">Press</a>
          </div>
        </li>

        <li>
          <a href="#">Contact Us <span class="plus">+</span></a>
          <div class="dropdown">
            <a href="#">Get in Touch</a>
            <a href="#">FAQ</a>
          </div>
        </li>

      </ul>

      <!-- Cart icon -->
      <button class="cart-btn" aria-label="Shopping bag">
        <i class="fa-regular fa-bag-shopping" style="font-size:19px;"></i>
      </button>

    </div>
  </nav>

  <!-- HERO IMAGE -->
  <section class="hero">
    <img
      class="hero-img"
      src="https://www.nikonekomatcha.com/wp-content/uploads/2020/08/Niko-Neko-Matcha-4-scaled.jpg"
      alt="Niko Neko Matcha hero"
    />
  </section>

  <script>
    // Mobile nav toggle
    const hamburger = document.getElementById('hamburger');
    const navLinks  = document.getElementById('navLinks');

    hamburger.addEventListener('click', () => {
      navLinks.classList.toggle('open');
      const spans = hamburger.querySelectorAll('span');
      if (navLinks.classList.contains('open')) {
        spans[0].style.transform = 'translateY(6.5px) rotate(45deg)';
        spans[1].style.opacity   = '0';
        spans[2].style.transform = 'translateY(-6.5px) rotate(-45deg)';
      } else {
        spans.forEach(s => { s.style.transform = ''; s.style.opacity = ''; });
      }
    });
  </script>

</body>
</html>
